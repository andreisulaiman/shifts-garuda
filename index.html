<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Shift Calendar – Reliable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f4f7fc;
            padding: 20px;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #5b7a9a;
        }
        .filter-group select, .filter-group button {
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #dce5ef;
            background: white;
            cursor: pointer;
        }
        .filter-group button {
            background: #1e3c72;
            color: white;
            border: none;
        }
        .calendar-wrapper {
            background: white;
            border-radius: 24px;
            overflow-x: auto;
        }
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .calendar-table th {
            background: #f8fafd;
            padding: 14px 10px;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
        }
        .calendar-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #ecf1f7;
        }
        .shift-cell {
            background: #eef3fa;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .off-cell {
            color: #b91c1c;
            background: #fff0f0;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .error {
            color: #b91c1c;
            text-align: center;
            padding: 40px;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Team Shift Calendar</h1>
        <div id="lastUpdated" style="font-size:0.8rem; color:#4a627a; margin-top:8px;">updating...</div>
    </div>
    <div class="filter-bar">
        <div class="filter-group">
            <label>📆 Month</label>
            <select id="monthSelect"></select>
        </div>
        <div class="filter-group">
            <label>👤 Name</label>
            <select id="nameFilter"><option value="all">All members</option></select>
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <div class="calendar-wrapper">
        <table class="calendar-table" id="calendarTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"><tr><td class="loading">Select a month...</td></tr></tbody>
        </table>
    </div>
    <footer>✅ Auto-refreshes every 5 minutes · No more CORS or 400 errors</footer>
</div>

<script>
    // ======================== CONFIGURATION ========================
    // 👇 REPLACE THIS WITH YOUR APPS SCRIPT WEB APP URL
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9bwIHWb-W_jYjqS-ijJMWOKcEGGYeLnXNY_sVgRmX7hwbG_pDzzyN67uEfSRRXxUilA/exec';
    
    // List your month sheets exactly as they are named in Google Sheets
    const MONTHS = ["April 2026", "May 2026", "June 2026", "July 2026"];
    // ================================================================

    let currentData = { rows: [], dayIndices: [], dayNumbers: [] };

    async function loadMonth(monthName) {
        const statusDiv = document.getElementById('lastUpdated');
        statusDiv.innerText = 'loading...';
        try {
            const url = `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(monthName)}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const json = await response.json();
            if (json.error) throw new Error(json.error);
            
            const headers = json.headers;
            const rows = json.rows;
            
            // Columns A=0, B=1, C=2 are fixed. Date columns start at index 3.
            const dayIndices = [];
            const dayNumbers = [];
            for (let i = 3; i < headers.length; i++) {
                const header = headers[i];
                const dayNum = parseInt(header.match(/\d+/)?.[0] || '0', 10);
                if (dayNum > 0 && dayNum <= 31) {
                    dayIndices.push(i);
                    dayNumbers.push(dayNum);
                }
            }
            // sort by day number
            const combined = dayIndices.map((idx, pos) => ({ idx, day: dayNumbers[pos] }));
            combined.sort((a,b) => a.day - b.day);
            currentData = {
                rows: rows,
                dayIndices: combined.map(c => c.idx),
                dayNumbers: combined.map(c => c.day)
            };
            
            // Populate name dropdown
            const nameSet = new Set();
            rows.forEach(row => { if (row[0]) nameSet.add(row[0].trim()); });
            const nameSelect = document.getElementById('nameFilter');
            nameSelect.innerHTML = '<option value="all">All members</option>';
            [...nameSet].sort().forEach(n => {
                nameSelect.innerHTML += `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`;
            });
            
            renderCalendar();
            statusDiv.innerText = `updated: ${new Date().toLocaleTimeString()}`;
        } catch (err) {
            console.error(err);
            document.getElementById('tableBody').innerHTML = `<tr><td class="error">❌ ${err.message}</td></tr>`;
            statusDiv.innerText = 'update failed';
        }
    }
    
    function renderCalendar() {
        const nameFilter = document.getElementById('nameFilter').value;
        let filteredRows = currentData.rows;
        if (nameFilter !== 'all') {
            filteredRows = filteredRows.filter(row => row[0]?.trim() === nameFilter);
        }
        // Build header
        const thead = document.getElementById('tableHead');
        let headerHtml = '<tr><th>Name</th><th>Employment No</th><th>Job Site</th>';
        for (let day of currentData.dayNumbers) {
            headerHtml += `<th>${day}</th>`;
        }
        headerHtml += '</tr>';
        thead.innerHTML = headerHtml;
        
        // Build body
        const tbody = document.getElementById('tableBody');
        if (filteredRows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">No members match filter</td></tr>';
            return;
        }
        let bodyHtml = '';
        for (let row of filteredRows) {
            bodyHtml += '<tr>';
            bodyHtml += `<td style="font-weight:600;">${escapeHtml(row[0] || '')}</td>`;
            bodyHtml += `<td>${escapeHtml(row[1] || '')}</td>`;
            bodyHtml += `<td>${escapeHtml(row[2] || '')}</td>`;
            for (let idx of currentData.dayIndices) {
                let val = (idx < row.length) ? row[idx] : '—';
                if (!val || val.trim() === '') val = '—';
                const isOff = val.toLowerCase().includes('off');
                const cls = isOff ? 'off-cell' : 'shift-cell';
                bodyHtml += `<td><span class="${cls}">${escapeHtml(val)}</span></td>`;
            }
            bodyHtml += '</tr>';
        }
        tbody.innerHTML = bodyHtml;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    
    // Populate month dropdown
    const monthSelect = document.getElementById('monthSelect');
    MONTHS.forEach(month => {
        monthSelect.innerHTML += `<option value="${month}">${month}</option>`;
    });
    monthSelect.addEventListener('change', (e) => loadMonth(e.target.value));
    document.getElementById('nameFilter').addEventListener('change', () => renderCalendar());
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('nameFilter').value = 'all';
        renderCalendar();
    });
    // Load first month
    if (MONTHS.length) loadMonth(MONTHS[0]);
    // Refresh every 5 minutes
    setInterval(() => {
        const current = monthSelect.value;
        if (current) loadMonth(current);
    }, 300000);
</script>
</body>
</html>
