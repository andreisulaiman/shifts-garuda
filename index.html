<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Team Schedule</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f4f7fc;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #1e3c72;
            color: white;
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Team Shift Schedule</h1>
    <div id="status">Loading...</div>
    <table id="schedule-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    // 👇 PASTE YOUR PUBLISHED CSV LINK HERE (from Step A)
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVVITCbL1Y9pdu1m1S0hC31EDjFy1vkLLgiiBXVgEeEJOlxk93M8KaT0dAu0oChiBExMgnJ2CLrIXI/pub?gid=0&single=true&output=csv';
    
    async function loadSchedule() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // Parse CSV
            const rows = csvText.trim().split('\n');
            const headers = rows[0].split(',');
            
            // Build table header
            const thead = document.getElementById('table-head');
            thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
            
            // Build table body
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                const rowHtml = '<tr>' + cols.map(c => `<td>${c}</td>`).join('') + '</tr>';
                tbody.innerHTML += rowHtml;
            }
            document.getElementById('status').innerHTML = '✅ Last updated: ' + new Date().toLocaleTimeString();
        } catch (error) {
            document.getElementById('status').innerHTML = '❌ Error loading schedule. Make sure your sheet is published.';
        }
    }
    
    loadSchedule();
    setInterval(loadSchedule, 300000);
</script>
</body>
</html>
