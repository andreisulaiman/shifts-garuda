<!DOCTYPE html>
<html>
<head>
  <title>Team Shifts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e293b;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }
    th {
      background: #334155;
    }
    tr:hover {
      background: #475569;
    }
  </style>
</head>
<body>

<h1>📅 Team Shift Schedule</h1>

<table id="shiftTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Date</th>
      <th>Shift</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVVITCbL1Y9pdu1m1S0hC31EDjFy1vkLLgiiBXVgEeEJOlxk93M8KaT0dAu0oChiBExMgnJ2CLrIXI/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1); // skip header
    const tableBody = document.querySelector("#shiftTable tbody");

    rows.forEach(row => {
      const cols = row.split(",");
      if (cols.length < 3) return;

      const tr = document.createElement("tr");

      cols.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col.trim();
        tr.appendChild(td);
      });

      tableBody.appendChild(tr);
    });
  })
  .catch(err => {
    document.body.innerHTML += "<p>Failed to load schedule.</p>";
    console.error(err);
  });
</script>

</body>
</html>
